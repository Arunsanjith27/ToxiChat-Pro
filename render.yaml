services:
  - type: web
    name: toxichat-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: MONGO_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: DB_NAME
        value: toxichat
      - key: REDIS_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: ADMIN_USERNAMES
        value: admin
    healthCheckPath: /
